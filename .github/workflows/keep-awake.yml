name: Keep Streamlit App Awake

on:
  schedule:
    # Run every 12 hours (more reliable than once/day)
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write   # REQUIRED to push commits

jobs:
  keep-alive:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0   # avoids shallow clone issues

      - name: Set up Git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Get current branch
        id: branch
        run: echo "branch=$(git rev-parse --abbrev-ref HEAD)" >> $GITHUB_OUTPUT

      - name: Pull latest changes (avoid conflicts)
        run: |
          git pull origin ${{ steps.branch.outputs.branch }} --rebase

      - name: Create empty commit
        run: |
          git commit --allow-empty -m "keep-alive: $(date -u +"%Y-%m-%d %H:%M:%S UTC")"

      - name: Push changes
        run: |
          git push origin HEAD:${{ steps.branch.outputs.branch }}
